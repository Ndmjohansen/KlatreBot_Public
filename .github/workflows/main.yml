name: Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy klatrebot to Pi
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ~/KlatreBot/KlatreBot_Public/
            git fetch origin main
            git checkout main || git checkout -b main origin/main
            git pull --ff-only origin main

            export PATH="$HOME/.local/bin:$PATH"
            POETRY_BIN="$(command -v poetry || true)"
            if [ -z "$POETRY_BIN" ]; then
              echo "Poetry not found on PATH; installing for $(id -un)"
              command -v curl >/dev/null 2>&1 || { echo "curl is required to install Poetry" >&2; exit 1; }
              curl -sSL https://install.python-poetry.org | python3 -
              POETRY_BIN="$(command -v poetry || true)"
            fi
            if [ -z "$POETRY_BIN" ]; then
              echo "Poetry install completed, but poetry is still not on PATH" >&2
              exit 1
            fi

            "$POETRY_BIN" install --sync --no-interaction

            # Atomic write of systemd EnvironmentFile (mode 600 from creation;
            # quoted heredoc prevents shell expansion of $/`).
            sudo install -d -m 755 /etc/klatrebot
            sudo install -m 600 -o root -g root /dev/stdin /etc/klatrebot/klatrebot.env <<'EOF'
            DISCORD_KEY=${{ secrets.BOT_KEY }}
            OPENAI_KEY=${{ secrets.OPENAI_API }}
            DISCORD_MAIN_CHANNEL_ID=${{ secrets.DISCORD_MAIN_CHANNEL_ID }}
            DISCORD_SANDBOX_CHANNEL_ID=${{ secrets.DISCORD_SANDBOX_CHANNEL_ID }}
            ADMIN_USER_ID=${{ secrets.ADMIN_USER_ID }}
            DB_PATH=/home/Admin/klatrebot-data/klatrebot_v2.db
            EOF

            # Ensure DB data dir exists (idempotent)
            sudo install -d -o Admin -g Admin -m 755 /home/Admin/klatrebot-data
            sudo install -d -o Admin -g Admin -m 755 \
              /home/Admin/.cache/pypoetry \
              /home/Admin/.config/pypoetry \
              /home/Admin/.local/share/pypoetry

            # Patch deployment sentinels in the unit file.
            POETRY_DIR="$(dirname "$POETRY_BIN")"
            sed \
              -e "s|@SERVICE_USER@|Admin|g" \
              -e "s|@PROJECT_DIR@|/home/Admin/KlatreBot/KlatreBot_Public|g" \
              -e "s|@DATA_DIR@|/home/Admin/klatrebot-data|g" \
              -e "s|@POETRY_DIR@|${POETRY_DIR}|g" \
              klatrebot.service \
              | sudo install -m 644 -o root -g root /dev/stdin /etc/systemd/system/klatrebot.service

            sudo systemctl daemon-reload
            sudo systemctl restart klatrebot
            sudo systemctl status klatrebot --no-pager
