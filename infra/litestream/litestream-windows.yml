# Litestream config for Windows dev bot.
# Streams the local dev klatrebot_v2.db to the Ubuntu LAN box over SFTP, where
# Hermes' replica reader sits. Same destination shape as the prod Pi config.
#
# Replace placeholders before use:
#   <UBUNTU_LAN_IP>   — static LAN IP of Ubuntu box
#   <UBUNTU_USER>     — SSH user on Ubuntu (typically `hermes`)
#   <REPO_PATH>       — absolute path to repo, forward slashes
#                       e.g. C:/Users/Admin/Documents/Repos/KlatreBot_Public
#   <SSH_KEY_PATH>    — absolute path to your SSH private key (forward slashes)
#                       e.g. C:/Users/Admin/.ssh/litestream_id_ed25519

dbs:
  - path: <REPO_PATH>/klatrebot_v2.db
    replicas:
      - type: sftp
        host: <UBUNTU_LAN_IP>:22
        user: <UBUNTU_USER>
        path: /var/lib/klatrebot-replica/klatrebot_v2.db
        key-path: <SSH_KEY_PATH>
        snapshot-interval: 1h
        retention: 24h
