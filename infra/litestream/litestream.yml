# Litestream config — runs on the Pi.
# Streams the live KlatreBot SQLite DB to the Ubuntu LAN box over SFTP.
# Hermes on Ubuntu reads the replicated file in read-only mode.
#
# Install on Pi:
#   sudo apt-get install -y litestream
#   sudo cp infra/litestream/litestream.yml /etc/litestream.yml
#   sudo cp infra/litestream/klatrebot-litestream.service /etc/systemd/system/
#   sudo systemctl daemon-reload
#   sudo systemctl enable --now klatrebot-litestream
#
# Replace placeholders before deploying:
#   <UBUNTU_LAN_IP>     — static LAN IP of Ubuntu box
#   <UBUNTU_USER>       — SSH user on Ubuntu (e.g. nicklas)
#   /home/Admin/klatrebot-data/klatrebot_v2.db — adjust if DB path differs

dbs:
  - path: /home/Admin/klatrebot-data/klatrebot_v2.db
    replicas:
      - type: sftp
        host: <UBUNTU_LAN_IP>:22
        user: <UBUNTU_USER>
        path: /var/lib/klatrebot-replica/klatrebot_v2.db
        # Use SSH key auth — no password in this file.
        key-path: /root/.ssh/litestream_id_ed25519
        # Snapshot every 1h, keep 24 generations.
        snapshot-interval: 1h
        retention: 24h
